{% load static %}

<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">


    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <title>portfolio</title>
</head>

<body>
    <!-- navbar -->

    <div class="nav-bar">

        <div class="logo">
            <img src="{% static 'images/logo.png' %}" alt="Portfolio Logo">
        </div>
        

        <ul class="nav-link">
            <li><a href="#home"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="#about"><i class="fas fa-user"></i> About</a></li>
            <li><a href="#projects"><i class="fas fa-briefcase"></i> Projects</a></li>
            <li><a href="#skills"><i class="fas fa-tools"></i> Skills</a></li>
            <li><a href="#contacts"><i class="fas fa-envelope"></i> Contacts</a></li>    
        </ul>


    </div>




    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
</body>

</html>


<style>

body{
    background-color: rgb(73, 73, 148);
}


.logo img {
    max-width: 150px; /* Adjust size */
    height: auto; /* Maintain aspect ratio */
    display: block; /* Ensures no extra spacing */
    margin: 0 auto; /* Centers the logo */
    border-radius: 10px; /* Optional rounded corners */
    margin-right: 60px;
}


.nav-bar {
    background-color: rgb(73, 73, 148); /* Transparent background */
    display: flex; /* Flex container for alignment */
    justify-content: center; /* Center content horizontally */
    align-items: center; /* Center content vertically */
    padding: 10px 0; /* Add padding for better spacing */
    height: 15vh;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Optional shadow for style */
  }

.nav-link {
    display: flex; /* Flex container for links */
    justify-content: center; /* Center links */
    align-items: center; /* Align items vertically */
    gap: 40px; /* Spacing between links */
    margin: 0; /* Remove default list margin */
    padding: 0; /* Remove default list padding */
}

.nav-link li {
    list-style: none; /* Remove bullet points */
}

.nav-link li a {
    text-decoration: none; /* Remove underline */
    font-family: Verdana, Geneva, Tahoma, sans-serif; /* Font styling */
    font-size: 20px; /* Font size */
    color: white; /* Link color */
    padding: 10px 20px; /* Spacing inside the link */
    border-radius: 40px; /* Rounded corners */
    border: 2px solid transparent; /* Invisible border for hover effect */
    transition: all 0.3s ease; /* Smooth hover effect */
}

.nav-link li a:hover {
    background-color: rgba(192, 55, 55, 0.9); /* Add hover background */
    color: white; /* Change text color on hover */
    border-color: rgba(192, 55, 55, 0.9); /* Optional hover border color */
}


</style>
